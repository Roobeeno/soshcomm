<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosh Comm Budgeting</title>
  <link rel="stylesheet" href="tablestyle.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans&family=Rubik:wght@600&display=swap" rel="stylesheet" />
</head>
<body>

  <h1 id="title" class="animate__animated animate__fadeIn">Sosh Comm Budgeting</h1>
  <form id="passwordForm" class="animate__animated animate__fadeIn">
    <input type="password" id="password" placeholder="Enter Password">
    <button type="button" onclick="validatePassword()">Submit</button>
  </form>

  <div id="content" class="hidden">

  <h2 id="totalAmountTitle" class="animate__animated animate__flipInX">
    Current Balance: $<span id="totalAmount">0.00</span>
  </h2>

  <div class="form-inputs animate__animated animate__flipInX">
    <select id="events"></select>
    <input type="text" id="date" placeholder="MM/DD/YYYY" />
    <input type="text" id="transactionAmount" placeholder="Transaction Amount" />
    <select id="categories">
      <option value="FoodAndBev">Food & Beverage</option>
      <option value="Alcohol">Alcohol</option>
      <option value="Decor">Decor</option>
      <option value="Services">Service</option>
      <option value="Reimbursement">Reimbursement</option>
      <option value="Dues">Social Dues</option>
      <option value="Door">Door Fee</option>
      <option value="Fine">Fine</option>
      <option value="Other">Other</option>
    </select>
    <input type="text" id="description" placeholder="Description of Purchase" />
    <input type="button" id="submission" value="Add Transaction" onclick="addRow();" />
  </div>

  <div class="table-container">
    <table class="animate__animated animate__fadeIn" id="main_table">
      <thead>
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Amount ($)</th>
          <th>Category</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>


<div class = "parent animate__animated animate__fadeIn">
  <div class="child">
    <div style="padding:50px">
      <iframe width="420" height="315"
      src="https://www.youtube.com/embed/i0M4ARe9v0Y?autoplay=1&mute=1&loop=1">
    </iframe> 
    </div>
  </div>
  <div class = "child"> 
    <div class="chart-container">
      <canvas class="my-chart"></canvas>
    </div>
  </div>

    <div class = "child">
      <div class="details" style ="padding-top:200px;">
      <ul style="list-style: none"></ul>
    </div>
  </div>
</div>

<button id="clearDataBtn">Clear All Data</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="main.js"></script>

</div>

</body>
</html>
